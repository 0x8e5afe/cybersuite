<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🛠️ CyberSuite - Pipeline Edition</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="styles.css">
    
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Core Application -->
    <script src="app.js" defer></script>
    
    <!-- Tools -->
    <script src="tools/jwt-tool.js" defer></script>
    <script src="tools/beautifier-tool.js" defer></script>
</head>
<body>
    <!-- Header -->
    <nav class="navbar navbar-dark bg-dark border-bottom border-secondary px-4 px-md-5">
        <div class="container-fluid px-0">
            <span class="navbar-brand mb-0 h1 d-flex align-items-center gap-2">
                <i class="bi bi-tools"></i>
                <span class="text-green fw-semibold">CyberSuite</span>
                <span class="badge bg-purple">Pipeline</span>
            </span>
        </div>
    </nav>

    <div class="container-fluid px-4 px-md-5 py-4">
        <!-- Mode Selector -->
        <div class="row mb-4">
            <div class="col-12">
                <div class="btn-group w-100" role="group">
                    <button type="button" class="btn btn-outline-primary mode-btn active" data-mode="single" onclick="switchMode('single')">
                        <i class="bi bi-gear-fill"></i> Single Tool Mode
                    </button>
                    <button type="button" class="btn btn-outline-success mode-btn" data-mode="pipeline" onclick="switchMode('pipeline')">
                        <i class="bi bi-diagram-3-fill"></i> Pipeline Mode
                    </button>
                </div>
            </div>
        </div>

        <!-- Single Tool Mode -->
        <div id="singleToolMode" style="display: block;">
            <!-- Search Bar -->
            <div class="row mb-4">
                <div class="col-12 col-lg-8 mx-auto">
                    <div class="input-group input-group-lg">
                        <span class="input-group-text bg-dark border-secondary">
                            <i class="bi bi-search"></i>
                        </span>
                        <input type="text" class="form-control border-secondary" id="toolSearch" placeholder="Search tools...">
                        <button class="btn btn-outline-secondary" type="button" id="clearSearch">
                            <i class="bi bi-x-lg"></i>
                        </button>
                    </div>
                    <small class="text-secondary mt-2 d-block text-center" id="searchResults"></small>
                </div>
            </div>

            <!-- Tools Sections -->
            <div id="toolsSections"></div>

            <!-- Workspace -->
            <div id="workspace"></div>
        </div>

        <!-- Pipeline Mode -->
        <div id="pipelineMode" style="display: none;">
            <div class="row g-4">
                <!-- Left Panel: Available Tools -->
                <div class="col-lg-4">
                    <div class="card bg-dark h-100">
                        <div class="card-header">
                            <i class="bi bi-box-seam"></i> Available Tools
                            <small class="text-muted d-block mt-1">Click to add to pipeline</small>
                        </div>
                        <div class="card-body">
                            <div id="availableTools" class="d-flex flex-column gap-2"></div>
                        </div>
                    </div>
                </div>

                <!-- Right Panel: Pipeline Chain -->
                <div class="col-lg-8">
                    <div class="card bg-dark mb-3">
                        <div class="card-header d-flex justify-content-between align-items-center">
                            <div>
                                <i class="bi bi-diagram-3"></i> Pipeline Chain
                                <span id="chainCompatibility" class="badge bg-secondary ms-2">Empty</span>
                            </div>
                            <div class="btn-group btn-group-sm">
                                <button class="btn btn-outline-danger" onclick="clearPipeline()">
                                    <i class="bi bi-trash"></i> Clear
                                </button>
                                <button class="btn btn-outline-success" onclick="executePipeline()" id="executePipelineBtn" disabled>
                                    <i class="bi bi-play-fill"></i> Execute
                                </button>
                            </div>
                        </div>
                        <div class="card-body">
                            <div id="pipelineChain" class="pipeline-chain">
                                <div class="text-center text-muted py-5">
                                    <i class="bi bi-diagram-3 fs-1"></i>
                                    <p class="mt-2">No tools in pipeline yet. Add tools from the left panel.</p>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Pipeline Input -->
                    <div class="card bg-dark mb-3">
                        <div class="card-header">
                            <i class="bi bi-box-arrow-in-right"></i> Pipeline Input
                            <span id="inputTypeInfo" class="badge bg-info ms-2" style="display: none;"></span>
                        </div>
                        <div class="card-body">
                            <textarea class="form-control font-monospace" id="pipelineInput" rows="6" placeholder="Enter your input data here..."></textarea>
                        </div>
                    </div>

                    <!-- Pipeline Output -->
                    <div class="card bg-dark" id="pipelineOutputCard" style="display: none;">
                        <div class="card-header bg-success">
                            <i class="bi bi-box-arrow-right"></i> Pipeline Output
                        </div>
                        <div class="card-body">
                            <div id="pipelineOutput"></div>
                            <button class="btn btn-outline-success mt-3" onclick="copyPipelineOutput()">
                                <i class="bi bi-clipboard"></i> Copy Output
                            </button>
                        </div>
                    </div>

                    <!-- Pipeline Errors -->
                    <div id="pipelineErrors"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer mt-5 py-3 bg-dark border-top border-secondary px-4 px-md-5">
        <div class="container text-center text-secondary px-0">
            <small>🛠️ CyberSuite Pipeline Edition - Chain tools together for powerful workflows</small>
        </div>
    </footer>

    <button id="scrollToTopBtn" class="btn" title="Scroll to top">
        <i class="bi bi-arrow-up"></i>
    </button>
</body>
</html>
