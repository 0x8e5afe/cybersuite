<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🛠️ CyberSuite</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="styles.css">
    
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Core Application -->
    <script src="app.js" defer></script>
</head>
<body>
    <!-- Header -->
    <nav class="navbar navbar-dark bg-dark border-bottom border-secondary px-4 px-md-5">
        <div class="container-fluid px-0">
            <span class="navbar-brand mb-0 h1">
                <i class="bi bi-tools"></i> CyberSuite
            </span>
            <span class="navbar-text text-secondary">
                Essential tools for every security expert — all in one suite.
            </span>
        </div>
    </nav>

    <div class="container-fluid px-4 px-md-5 py-4">
        <!-- Search Bar -->
        <div class="row mb-4">
            <div class="col-12 col-lg-8 mx-auto">
                <div class="input-group input-group-lg">
                    <span class="input-group-text bg-dark border-secondary">
                        <i class="bi bi-search"></i>
                    </span>
                    <input type="text" class="form-control border-secondary" id="toolSearch" placeholder="Search tools by name or description...">
                    <button class="btn btn-outline-secondary" type="button" id="clearSearch">
                        <i class="bi bi-x-lg"></i>
                    </button>
                </div>
                <small class="text-secondary mt-2 d-block text-center" id="searchResults"></small>
            </div>
        </div>

        <!-- Legend -->
        <div class="row mb-4">
            <div class="col-12">
                <div class="d-flex gap-3 flex-wrap justify-content-center">
                    <span class="badge bg-danger"><i class="bi bi-crosshair"></i> Red (Offensive)</span>
                    <span class="badge bg-primary"><i class="bi bi-shield-fill"></i> Blue (Defensive)</span>
                    <span class="badge bg-purple"><i class="bi bi-layers-fill"></i> Purple (Both)</span>
                </div>
            </div>
        </div>

        <!-- Category Filters -->
        <div class="row mb-4">
            <div class="col-12">
                <div class="btn-group d-flex flex-wrap justify-content-center gap-2" role="group">
                    <button type="button" class="btn btn-outline-light category-filter active" data-category="all">
                        <i class="bi bi-grid-fill"></i> All Tools
                    </button>
                    <button type="button" class="btn btn-outline-danger category-filter" data-category="red">
                        <i class="bi bi-crosshair"></i> Red
                    </button>
                    <button type="button" class="btn btn-outline-primary category-filter" data-category="blue">
                        <i class="bi bi-shield-fill"></i> Blue
                    </button>
                    <button type="button" class="btn btn-outline-purple category-filter" data-category="purple">
                        <i class="bi bi-layers-fill"></i> Purple
                    </button>
                </div>
            </div>
        </div>

        <!-- Tools Sections -->
        <div id="toolsSections"></div>

        <!-- Workspace -->
        <div id="workspace"></div>
    </div>

    <!-- Footer -->
    <footer class="footer mt-5 py-3 bg-dark border-top border-secondary px-4 px-md-5">
        <div class="container text-center text-secondary px-0">
            <small>🛠️ CyberSuite -  Essential tools for every security expert — all in one suite. | 
                <a href="https://github.com/0x8e5afe/cybersuite" target="_blank" class="text-decoration-none text-info">
                    <i class="bi bi-github"></i> Contribute on GitHub
                </a>
            </small>
        </div>
    </footer>

    <button id="scrollToTopBtn" class="btn" title="Scroll to top">
        <i class="bi bi-arrow-up"></i>
    </button>
</body>
</html>
